<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
<style>
  text { font-family: Menlo, Monaco, Consolas, monospace; font-size: 12px; }
  .def { fill: #a9b1d6 }
  .grn { fill: #9ece6a }
  .cyn { fill: #7dcfff }
  .ylw { fill: #e0af68 }
  .red { fill: #f7768e }
  .wht { fill: #c0caf5 }
  .dim { fill: #565f89 }

  /* Phase 1: 0-4s, Phase 2: 4-9s, Phase 3: 9-14s. Total 14s loop. */

  /* Phase 1: cmd at 0s, output at 0.5s, hide at 4s */
  @keyframes p1cmd {
    0%      { opacity: 0 }
    0.5%    { opacity: 1 }
    28%     { opacity: 1 }
    29%     { opacity: 0 }
    100%    { opacity: 0 }
  }
  @keyframes p1out {
    0%      { opacity: 0 }
    3.6%    { opacity: 0 }
    4.5%    { opacity: 1 }
    28%     { opacity: 1 }
    29%     { opacity: 0 }
    100%    { opacity: 0 }
  }

  /* Phase 2: cmd at 4s, output at 4.5s, hide at 9s */
  @keyframes p2cmd {
    0%      { opacity: 0 }
    28.5%   { opacity: 0 }
    29%     { opacity: 1 }
    64%     { opacity: 1 }
    64.5%   { opacity: 0 }
    100%    { opacity: 0 }
  }
  @keyframes p2out {
    0%      { opacity: 0 }
    32%     { opacity: 0 }
    33%     { opacity: 1 }
    64%     { opacity: 1 }
    64.5%   { opacity: 0 }
    100%    { opacity: 0 }
  }

  /* Phase 3: cmd at 9s, output at 9.5s, hide at 14s */
  @keyframes p3cmd {
    0%      { opacity: 0 }
    64.2%   { opacity: 0 }
    64.6%   { opacity: 1 }
    99.5%   { opacity: 1 }
    100%    { opacity: 0 }
  }
  @keyframes p3out {
    0%      { opacity: 0 }
    67.8%   { opacity: 0 }
    68.5%   { opacity: 1 }
    99.5%   { opacity: 1 }
    100%    { opacity: 0 }
  }

  .p1c { animation: p1cmd 14s infinite }
  .p1o { animation: p1out 14s infinite }
  .p2c { animation: p2cmd 14s infinite }
  .p2o { animation: p2out 14s infinite }
  .p3c { animation: p3cmd 14s infinite }
  .p3o { animation: p3out 14s infinite }

  /* Blinking cursor for each phase */
  @keyframes cur1 {
    0%      { opacity: 0 }
    0.5%    { opacity: 1 }
    1%      { opacity: 0 }
    1.5%    { opacity: 1 }
    2%      { opacity: 0 }
    2.5%    { opacity: 1 }
    3%      { opacity: 0 }
    3.6%    { opacity: 1 }
    5%      { opacity: 1 }
    5.5%    { opacity: 0 }
    6%      { opacity: 1 }
    6.5%    { opacity: 0 }
    7%      { opacity: 1 }
    28%     { opacity: 1 }
    29%     { opacity: 0 }
    100%    { opacity: 0 }
  }
  @keyframes cur2 {
    0%      { opacity: 0 }
    28.5%   { opacity: 0 }
    29%     { opacity: 1 }
    29.5%   { opacity: 0 }
    30%     { opacity: 1 }
    30.5%   { opacity: 0 }
    31%     { opacity: 1 }
    33%     { opacity: 1 }
    33.5%   { opacity: 0 }
    34%     { opacity: 1 }
    34.5%   { opacity: 0 }
    35%     { opacity: 1 }
    64%     { opacity: 1 }
    64.5%   { opacity: 0 }
    100%    { opacity: 0 }
  }
  @keyframes cur3 {
    0%      { opacity: 0 }
    64.2%   { opacity: 0 }
    64.6%   { opacity: 1 }
    65%     { opacity: 0 }
    65.5%   { opacity: 1 }
    66%     { opacity: 0 }
    66.5%   { opacity: 1 }
    68.5%   { opacity: 1 }
    69%     { opacity: 0 }
    69.5%   { opacity: 1 }
    70%     { opacity: 0 }
    70.5%   { opacity: 1 }
    99.5%   { opacity: 1 }
    100%    { opacity: 0 }
  }
  .cur1 { animation: cur1 14s infinite }
  .cur2 { animation: cur2 14s infinite }
  .cur3 { animation: cur3 14s infinite }
</style>
<defs>
  <clipPath id="tc"><rect x="0" y="0" width="800" height="600" rx="10"/></clipPath>
</defs>
<g clip-path="url(#tc)">
  <!-- Window -->
  <rect width="800" height="600" rx="10" fill="#1a1b26"/>
  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#16161e"/>
  <rect y="26" width="800" height="10" fill="#16161e"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="400" y="22" text-anchor="middle" class="dim" font-size="13">stoa</text>

  <!-- ====== PHASE 1: stoa agents ====== -->
  <g class="p1c"><text x="20" y="62"><tspan class="cyn">$ </tspan><tspan class="def">stoa agents</tspan></text></g>
  <g class="cur1"><rect x="112" y="50" width="7" height="14" fill="#a9b1d6"/></g>
  <g class="p1o">
    <text x="20" y="98"><tspan class="wht">=== stoa agents ===</tspan></text>
    <text x="20" y="134"><tspan class="cyn">[scout]</tspan><tspan class="def">        Onchain intelligence         </tspan><tspan class="ylw">9 skills</tspan><tspan class="def">   </tspan><tspan class="dim">*/30 * * * *</tspan></text>
    <text x="20" y="152"><tspan class="cyn">[analyst]</tspan><tspan class="def">      Signal processing            </tspan><tspan class="ylw">10 skills</tspan><tspan class="def">  </tspan><tspan class="dim">0 * * * *</tspan></text>
    <text x="20" y="170"><tspan class="cyn">[executor]</tspan><tspan class="def">     Trade execution              </tspan><tspan class="ylw">3 skills</tspan><tspan class="def">   </tspan><tspan class="dim">reactive</tspan></text>
    <text x="20" y="188"><tspan class="cyn">[guardian]</tspan><tspan class="def">     Risk &amp; self-healing           </tspan><tspan class="ylw">10 skills</tspan><tspan class="def">  </tspan><tspan class="dim">*/15 * * * *</tspan></text>
    <text x="20" y="206"><tspan class="cyn">[researcher]</tspan><tspan class="def">   Deep research                </tspan><tspan class="ylw">15 skills</tspan><tspan class="def">  </tspan><tspan class="dim">0 */4 * * *</tspan></text>
    <text x="20" y="224"><tspan class="cyn">[writer]</tspan><tspan class="def">       Content &amp; publishing         </tspan><tspan class="ylw">20 skills</tspan><tspan class="def">  </tspan><tspan class="dim">0 8 * * *</tspan></text>
    <text x="20" y="242"><tspan class="cyn">[ops]</tspan><tspan class="def">          DevOps &amp; automation          </tspan><tspan class="ylw">28 skills</tspan><tspan class="def">  </tspan><tspan class="dim">0 */2 * * *</tspan></text>
  </g>

  <!-- ====== PHASE 2: stoa test ====== -->
  <g class="p2c"><text x="20" y="62"><tspan class="cyn">$ </tspan><tspan class="def">stoa test</tspan></text></g>
  <g class="cur2"><rect x="98" y="50" width="7" height="14" fill="#a9b1d6"/></g>
  <g class="p2o">
    <text x="20" y="98"><tspan class="wht">&#x2550;&#x2550;&#x2550; stoa pipeline test &#x2550;&#x2550;&#x2550;</tspan></text>
    <text x="20" y="134"><tspan class="dim">[0] Config &amp; Reset</tspan></text>
    <text x="20" y="152"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> 7 agents loaded from stoa.yml</tspan></text>
    <text x="20" y="170"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> scout has scan-tokens skill</tspan></text>
    <text x="20" y="188"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> executor is reactive (no schedule)</tspan></text>
    <text x="20" y="216"><tspan class="dim">[1] Scout &#x2192; signal &#x2192; Analyst</tspan></text>
    <text x="20" y="234"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> analyst received </tspan><tspan class="ylw">1</tspan><tspan class="def"> message</tspan></text>
    <text x="20" y="252"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> message type is </tspan><tspan class="cyn">'signal'</tspan></text>
    <text x="20" y="270"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> signal token is </tspan><tspan class="cyn">JUP</tspan></text>
    <text x="20" y="298"><tspan class="dim">[2] Analyst &#x2192; trade-signal &#x2192; Executor</tspan></text>
    <text x="20" y="316"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> executor received </tspan><tspan class="ylw">1</tspan><tspan class="def"> message</tspan></text>
    <text x="20" y="334"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> confidence = </tspan><tspan class="ylw">0.85</tspan></text>
    <text x="20" y="352"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> scout received feedback</tspan></text>
    <text x="20" y="380"><tspan class="dim">[5] Guardian &#x2192; drawdown &#x2192; </tspan><tspan class="red">HALT</tspan></text>
    <text x="20" y="398"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> crash P&amp;L: </tspan><tspan class="red">-24.1%</tspan></text>
    <text x="20" y="416"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> swarm status: </tspan><tspan class="red">halted</tspan></text>
    <text x="20" y="434"><tspan class="def">  </tspan><tspan class="grn">&#x2713;</tspan><tspan class="def"> executor received urgent sell</tspan></text>
    <text x="20" y="470"><tspan class="wht">&#x2550;&#x2550;&#x2550; Results &#x2550;&#x2550;&#x2550;</tspan></text>
    <text x="20" y="488"><tspan class="def">  </tspan><tspan class="grn">39 passed</tspan><tspan class="def">  </tspan><tspan class="def">0 failed</tspan></text>
    <text x="20" y="506"><tspan class="grn">ALL TESTS PASSED</tspan></text>
  </g>

  <!-- ====== PHASE 3: stoa status ====== -->
  <g class="p3c"><text x="20" y="62"><tspan class="cyn">$ </tspan><tspan class="def">stoa status</tspan></text></g>
  <g class="cur3"><rect x="112" y="50" width="7" height="14" fill="#a9b1d6"/></g>
  <g class="p3o">
    <text x="20" y="98"><tspan class="wht">=== stoa swarm status ===</tspan></text>
    <text x="20" y="134"><tspan class="def">Status: </tspan><tspan class="grn">active</tspan></text>
    <text x="20" y="152"><tspan class="def">Agents: </tspan><tspan class="ylw">7</tspan><tspan class="def"> online</tspan></text>
    <text x="20" y="170"><tspan class="def">Skills: </tspan><tspan class="ylw">122</tspan><tspan class="def"> loaded</tspan></text>
    <text x="20" y="188"><tspan class="def">Mesh:   </tspan><tspan class="ylw">3</tspan><tspan class="def"> pending messages</tspan></text>
    <text x="20" y="224"><tspan class="wht">Portfolio:</tspan></text>
    <text x="20" y="242"><tspan class="def">  Value: </tspan><tspan class="grn">$1,003.45</tspan><tspan class="def"> (</tspan><tspan class="ylw">5.85</tspan><tspan class="def"> SOL)</tspan></text>
    <text x="20" y="260"><tspan class="def">  Drawdown: </tspan><tspan class="grn">0%</tspan></text>
    <text x="20" y="278"><tspan class="def">  Positions: </tspan><tspan class="ylw">1</tspan></text>
  </g>
</g>
</svg>
